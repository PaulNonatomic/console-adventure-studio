name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      # `npm install` rather than `npm ci` — the lockfile is
      # generated on Windows by the author and vitest 4 includes
      # platform-specific optional deps (@emnapi/*, esbuild
      # Linux variants) that don't end up in a Windows-authored
      # lockfile. `npm install` resolves them at install time
      # instead of insisting on bit-exact lockfile parity.
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
